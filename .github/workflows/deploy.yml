name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  deploy:
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # DATABASE_URL is a Worker secret (set once via `wrangler secret put`),
      # not a GitHub secret — deploys never touch it.
      # Pinned to a commit SHA (v4.0.0): this job holds the account API token,
      # so a floating major tag would be a supply-chain risk.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # The deploy step succeeding only means the upload worked — verify the
      # Worker actually serves before calling the deploy green.
      - name: Verify deployment
        run: |
          sleep 5
          curl -sf --max-time 15 https://tio.twz.app/health | grep -q '"status":"ok"'
          echo "health check passed"
