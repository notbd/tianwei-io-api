app = "tianwei-io-api"
primary_region = "yyz"

[build]
dockerfile = "dockerfile"

[env]
NODE_ENV = "production"
PORT = "3001"

[[services]]
protocol = "tcp"
internal_port = 3001

[services.concurrency]
type = "connections"
soft_limit = 20
hard_limit = 25

[[services.ports]]
port = 80
handlers = [ "http" ]

[[services.ports]]
port = 443
handlers = [
  "tls",
  "http"
]

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
